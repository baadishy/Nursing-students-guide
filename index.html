    <style>
      @font-face {
        font-family: "CameraPlainVariable";
        src: url("https://cdn.gpteng.co/mcp-widgets/v1/fonts/CameraPlainVariable.woff2")
          format("woff2");
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
      }

      #lovable-badge {
        --badge-bg: #1b1b1b;
        --badge-text: #c5c1b9;
        --badge-text-hover: #dcdad5;
        --badge-radius: 6px;
        --badge-padding: 8px;
        --badge-gap: 6px;
        --badge-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.88), 0 1px 0 0 rgba(0, 0, 0, 0.04),
          0 2px 2px -1px rgba(0, 0, 0, 0.08),
          0 4px 4px -2px rgba(0, 0, 0, 0.08),
          0 8px 8px -4px rgba(0, 0, 0, 0.08),
          0 16px 16px -8px rgba(0, 0, 0, 0.08);
        --badge-transition-duration: 0.2s;
        --badge-transition-easing: cubic-bezier(0.16, 1, 0.32, 1);
        --focus-color: #575ecf;
        --focus-offset: 2px;
        --focus-width: 2px;

        position: fixed;
        bottom: 12px;
        right: 12px;
        height: 24px;
        display: flex;
        align-items: center;
        z-index: 1000000;
        background-color: var(--badge-bg);
        color: var(--badge-text);
        border-radius: var(--badge-radius);
        box-shadow: var(--badge-shadow);
        font-size: 12px;
        font-family:
          CameraPlainVariable,
          "CameraPlainVariable Fallback",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        font-weight: 400 !important;
        text-transform: none !important;
        font-feature-settings: normal !important;
        transform: translateZ(0);
        will-change: transform, opacity;
      }

      #lovable-badge-cta {
        display: flex;
        align-items: center;
        gap: var(--badge-gap);
        padding: 0 var(--badge-padding);
        height: 100%;
        color: inherit;
        text-decoration: none;
        white-space: nowrap;
        border-radius: var(--badge-radius) 0 0 var(--badge-radius);
        transition:
          background-color var(--badge-transition-duration) ease,
          color var(--badge-transition-duration) ease,
          transform 0.1s ease;
      }

      #lovable-badge-cta:hover {
        background: rgba(255, 255, 255, 0.04);
        color: var(--badge-text-hover);
      }

      #lovable-badge-cta:active {
        transform: scale(0.98);
      }

      #lovable-badge-cta:focus {
        outline: none;
      }

      #lovable-badge-cta:focus-visible {
        outline: var(--focus-width) solid var(--focus-color);
        outline-offset: var(--focus-offset);
        z-index: 1;
      }

      #lovable-badge-text {
        line-height: 1;
      }

      #lovable-badge-divider {
        width: 1px;
        height: 24px;
        background-color: rgba(255, 255, 255, 0.04);
        flex-shrink: 0;
      }

      #lovable-badge-close {
        width: 24px;
        height: 24px;
        min-width: 24px;
        min-height: 24px;
        cursor: pointer;
        background: none;
        border: none;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 0 var(--badge-radius) var(--badge-radius) 0;
        flex-shrink: 0;
        transition:
          background-color var(--badge-transition-duration) ease,
          transform 0.1s ease;
      }

      #lovable-badge-close:hover {
        background: rgba(255, 255, 255, 0.04);
      }

      #lovable-badge-close:active {
        transform: scale(0.92);
      }

      #lovable-badge-close:focus {
        outline: none;
      }

      #lovable-badge-close:focus-visible {
        outline: var(--focus-width) solid var(--focus-color);
        outline-offset: calc(var(--focus-offset) * -1);
        z-index: 1;
      }

      #lovable-badge-close svg path {
        fill: var(--badge-text);
        transition: fill var(--badge-transition-duration) ease;
      }

      .cta-btn {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 1000001;
        background: linear-gradient(135deg, #0b2a4a, #1f6f8b);
        color: #f7f9fb;
        border: none;
        border-radius: 999px;
        padding: 12px 18px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        box-shadow:
          0 10px 30px rgba(0, 0, 0, 0.2),
          0 2px 8px rgba(0, 0, 0, 0.12);
        transition: transform 0.15s ease, box-shadow 0.15s ease,
          filter 0.15s ease;
      }

      .cta-btn:hover {
        transform: translateY(-1px);
        box-shadow:
          0 14px 34px rgba(0, 0, 0, 0.24),
          0 4px 10px rgba(0, 0, 0, 0.14);
        filter: brightness(1.05);
      }

      .cta-btn:active {
        transform: translateY(0);
        box-shadow:
          0 8px 20px rgba(0, 0, 0, 0.2),
          0 2px 8px rgba(0, 0, 0, 0.12);
      }

      .cta-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      #lovable-badge-close:hover svg path {
        fill: var(--badge-text-hover);
      }

      @media (prefers-reduced-motion: reduce) {
        #lovable-badge-cta,
        #lovable-badge-close,
        #lovable-badge-close svg path {
          transition: none;
        }

        #lovable-badge-cta:active,
        #lovable-badge-close:active {
          transform: none;
        }
      }

      @media (prefers-contrast: high) {
        #lovable-badge {
          --badge-bg: #000;
          --badge-text: #fff;
          --badge-text-hover: #fff;
          border: 2px solid currentColor;
        }

        #lovable-badge-cta:focus-visible,
        #lovable-badge-close:focus-visible {
          outline-width: 3px;
        }
      }

  <body>
    <div id="root"></div>
    <button id="install-btn" class="cta-btn" type="button" aria-label="Install PWA">
      Install app
    </button>
    <button id="download-btn" class="cta-btn" type="button" aria-label="Download Android APK">
      Download Android app
    </button>

      <script>
        (function () {
        let deferredPrompt = null;
        const installBtn = document.getElementById("install-btn");
        const downloadBtn = document.getElementById("download-btn");
        if (!installBtn || !downloadBtn) return;

        const apkPath = "/assets/nursing-guide.apk";
        const isAndroid = /android/i.test(navigator.userAgent);
        const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
        const isStandalone =
          window.matchMedia("(display-mode: standalone)").matches ||
          window.navigator.standalone === true;

        const hide = (el) => {
          el.hidden = true;
          el.disabled = true;
        };
        const show = (el) => {
          el.hidden = false;
          el.disabled = false;
        };

        if (isStandalone) {
          hide(installBtn);
          hide(downloadBtn);
          return;
        }

        // Android: prefer APK download button
        if (isAndroid) {
          hide(installBtn);
          show(downloadBtn);
        } else {
          hide(downloadBtn);
          hide(installBtn);
        }

        // Handle APK download
        downloadBtn.addEventListener("click", (event) => {
          event.preventDefault();

          const proceed = confirm(
            "Download and install the Android app? You may need to allow installs from your browser."
          );
          if (proceed) {
            window.location.href = apkPath;
          }
        });

        // PWA install flow for desktop/other platforms
        window.addEventListener("beforeinstallprompt", (event) => {
          event.preventDefault();
          deferredPrompt = event;
          if (!isAndroid) {
            show(installBtn);
          }
        });

        installBtn.addEventListener("click", async () => {
          if (deferredPrompt) {
            installBtn.disabled = true;
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
            hide(installBtn);
          } else if (isIos) {
            alert(
              "On iOS, tap the Share icon and choose 'Add to Home Screen' to install."
            );
          } else {
            alert(
              "Install prompt not available right now. Try using your browser's menu to Install/Add to Home screen."
            );
          }
        });

        window.addEventListener("appinstalled", () => {
          deferredPrompt = null;
          hide(installBtn);
          hide(downloadBtn);
        });

        // Fallback: after 3s, if no prompt and not Android, still show install button for guidance
        setTimeout(() => {
          if (!isAndroid && !deferredPrompt && !isStandalone) {
            show(installBtn);
          }
        }, 3000);
      })();
    </script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .catch((error) =>
              console.error("Service worker registration failed", error),
            );
        });
      }
    </script>

    <script>
      // Don't show the lovable-badge if the page is in an iframe or if it's being rendered by puppeteer (screenshot service)
      if (
        window.self !== window.top ||
        navigator.userAgent.includes("puppeteer")
      ) {
        // the page is in an iframe
        var badge = document.getElementById("lovable-badge");
        if (badge) {
          badge.style.display = "none";
        }
      }

      // Add click event listener to close button with animation
      var closeButton = document.getElementById("lovable-badge-close");
      if (closeButton) {
        closeButton.addEventListener("click", function (event) {
          event.preventDefault();
          event.stopPropagation();
          var badge = document.getElementById("lovable-badge");
          if (badge) {
            badge.classList.add("closing");
            setTimeout(function () {
              if (badge) {
                badge.style.display = "none";
              }
            }, 240);
          }
        });
      }
    </script>
